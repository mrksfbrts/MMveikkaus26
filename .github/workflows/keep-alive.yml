name: Keep Streamlit App Awake

on:
  schedule:
    - cron: '0 */2 * * *'      # Joka 2. tunti
  workflow_dispatch:

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    
    steps:
      - name: Herätä sovellus
        run: |
          echo "🟢 Herätetään sovellus klo $(date -u)"
          curl -I -L -s -f "https://haamuilua.streamlit.app/" > /dev/null || true
          echo "✅ Sovellus herätetty onnistuneesti"
